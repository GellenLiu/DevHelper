<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DevUI Dev Helper</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="appContainer">
        <!-- 菜单页面 -->
        <div id="menuPage" class="page active">
            <div class="app-header">
                <h2 class="app-title">DevUI Dev Helper
                    <span class="version">v1.1</span>
                </h2>
                <span id="manageFeaturesBtn" class="manage-icon" title="功能管理">⚙️</span>
            </div>
            <ul class="feature-list" id="featureList"></ul>
                    
        </div>

        <!-- 设置页面容器 -->
        <div id="settingsPage" class="page">
            <div class="header">
                <button id="backButton" class="back-button">←</button>
                <h2 class="page-title">Settings</h2>
            </div>
            <div id="settingsContent"></div>
        </div>
    </div>
    <script type="module" src="popup.js"></script>
</body>
</html>
