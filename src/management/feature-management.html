<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>功能管理 | DevUI Dev Helper</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0078d7;
            --secondary-color: #f5f5f5;
            --text-color: #333;
            --text-secondary: #666;
            --border-color: #eee;
            --success-color: #00b42a;
            --feature-card-width: 320px;
            --warning-color: #ff7d00;
            --danger-color: #f53f3f;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            background-color: #f9f9f9;
            overflow-x: hidden;
        }

        .header {
            padding: 15px 30px;
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-title {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .content {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            height: calc(100vh - 70px);
            overflow-y: auto;
        }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            box-shadow: var(--card-shadow);
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: var(--secondary-color);
            border-radius: 4px;
            padding: 8px 15px;
            width: 300px;
        }

        .search-box i {
            color: var(--text-secondary);
            margin-right: 10px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 14px;
        }

        .category-filter {
            display: flex;
            gap: 10px;
        }

        .category-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: white;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .category-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .category-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .feature-card {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .feature-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feature-icon-container {
            flex-shrink: 0;
        }

        .feature-icon {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            object-fit: contain;
        }

        .letter-icon {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .feature-title-container {
            flex-grow: 1;
        }

        .feature-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .feature-category {
            display: inline-block;
            padding: 3px 8px;
            background-color: var(--secondary-color);
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .feature-body {
            padding: 20px;
        }

        .feature-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .feature-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .feature-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .install-btn {
            background-color: var(--primary-color);
            color: white;
        }

        .install-btn:hover {
            background-color: #005a9e;
        }

        .uninstall-btn {
            background-color: var(--danger-color);
            color: white;
        }

        .uninstall-btn:hover {
            background-color: #d4380d;
        }

        .settings-btn {
            background-color: var(--secondary-color);
            color: var(--text-color);
        }

        .settings-btn:hover {
            background-color: #e5e5e5;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #e5e5e5;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            font-weight: normal;
        }

        @media (max-width: 768px) {
            .filter-bar {
                flex-direction: column;
                gap: 15px;
            }

            .search-box {
                width: 100%;
            }

            .category-filter {
                flex-wrap: wrap;
                justify-content: center;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2 class="page-title">DevUI Dev Helper - 功能管理</h2>
        <div class="user-info">
            <div class="avatar">D</div>
        </div>
    </div>
    <div class="content">
        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索功能...">
            </div>
            <div class="category-filter">
                <button class="category-btn active" data-category="all">全部功能</button>
                <button class="category-btn" data-category="development">开发工具</button>
                <button class="category-btn" data-category="monitoring">监控工具</button>
                <button class="category-btn" data-category="utility">实用工具</button>
            </div>
        </div>

        <div class="feature-grid" id="featureGrid"></div>
    </div>

    <script type="module" src="feature-management.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

</body>
</html>
