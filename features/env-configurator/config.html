<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>环境配置修改器设置</title>
    <link rel="stylesheet" href="../../css/common.css" />
    <style>
      .config-container {
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      .config-section {
        margin-bottom: 20px;
        padding: 15px;
        background-color: #f5f5f5;
        border-radius: 8px;
      }
      .config-section h3 {
        margin-top: 0;
        margin-bottom: 15px;
        color: #333;
        border-bottom: 1px solid #ddd;
        padding-bottom: 8px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .form-group input[type="text"],
      .form-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      .btn {
        padding: 8px 16px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn:hover {
        background-color: #45a049;
      }
      .delete-btn {
        background-color: #f44336;
      }
      .delete-btn:hover {
        background-color: #d32f2f;
      }
      .config-list {
        list-style-type: none;
        padding: 0;
      }
      .config-list li {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #addDomain {
        width: 80px;
      }
    </style>
  </head>
  <body>
    <div class="config-container">
      <h2>环境配置修改器设置</h2>

      <div class="config-section">
        <h3>开关配置</h3>
        <toggle-switch id="enableSwitch" label="是否启用"></toggle-switch>
      </div>

      <div class="config-section">
        <h3>数据劫持配置</h3>
        <div
          class="form-group"
          id="manualConfigPathContainer"
          style="display: none"
        >
          <label for="manualConfigPath">配置对象路径</label>
          <input
            type="text"
            id="manualConfigPath"
            placeholder="例如: window.__CONFIG__"
          />
        </div>
      </div>

      <div class="config-section">
        <h3>域名配置</h3>
        <div class="form-group">
          <label for="newDomain"
            >添加监控域名（支持正则表达式，* 表示全部）</label
          >
          <div style="display: flex; gap: 8px; margin-bottom: 10px">
            <input
              type="text"
              id="newDomain"
              placeholder="例如: example.com, *.test.com"
            />
            <button id="addDomain" class="btn" style="width: auto">添加</button>
          </div>
          <div
            id="domainList"
            style="
              border: 1px solid #ddd;
              border-radius: 4px;
              padding: 10px;
              max-height: 150px;
              overflow-y: auto;
            "
          >
            <!-- 域名列表将通过JS动态生成 -->
            <div class="domain-item" style="display: none">暂无添加的域名</div>
          </div>
        </div>
      </div>

      <div class="config-section">
        <h3>预设配置导入</h3>
  
      </div>

      <div class="form-group">
        <button id="saveSettingsBtn" class="btn">保存设置</button>
        <button id="resetSettingsBtn" class="btn">重置设置</button>
      </div>
    </div>

    <script src="config.js"></script>
  </body>
</html>
